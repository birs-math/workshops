require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance
  - rubocop-faker

inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 2.7
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'
    - 'log/**/*'
    - 'public/**/*'
    - 'storage/**/*'

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 30

Metrics/ClassLength:
  Max: 300

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'config/routes.rb'
    - 'config/environments/*.rb'
    - 'config/initializers/devise.rb'
    - 'lib/tasks/**/*.rake'
    - 'db/seeds.rb'
    - 'app/controllers/memberships_controller.rb'

Rails:
  Enabled: true

Rails/FilePath:
  EnforcedStyle: arguments

# Disabled in baseline; tracked to re-enable after dedicated cleanup PRs.
Naming/PredicateName:
  Enabled: false

Style/NumericPredicate:
  Enabled: false
